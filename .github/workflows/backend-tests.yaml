name: Test backend
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches-ignore:
      - 'main'
    paths:
      - '.github/workflows/backend-tests.yaml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'testing.yaml'
      - 'application/briefkasten/**'
      - 'application/Pipfile**'
      - 'application/pyproject.toml'
      - 'application/requirements.txt'
      - 'application/setup.*'
      - 'application/tox.ini'
jobs:
  build:
    uses: zeitonline/gh-action-workflows/.github/workflows/build-test-push.yaml@89c86adf124007d97fae113c3e0c176e9c8391c6 # 4.1.0
